*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
    --navy: #42444F;
    --black: #161818;
    --oxblood: #512923;
    --cream: #E2D6CC;
    --cream-60: rgba(226,214,204,0.6);
    --cream-30: rgba(226,214,204,0.3);
    --cream-12: rgba(226,214,204,0.12);
    --oxblood-40: rgba(81,41,35,0.4);
}

body {
    background: transparent;
    color: var(--cream);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
}

.wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 28px 28px 48px;
}
.wrap.bg {
    background: var(--navy);
}

/* ── LOGO ── */
.logo-wrap { display:none; }

/* ── PATH CARDS ── */
.path-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 0;
}
.pc {
    border: 1px solid rgba(226,214,204,0.18);
    padding: 36px 24px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}
.pc::before {
    content:''; position:absolute; inset:0;
    background:var(--oxblood); opacity:0; transition:opacity 0.3s ease;
}
.pc:hover::before { opacity:1; }
.pc:hover { border-color:var(--oxblood); }
.pc > * { position:relative; z-index:1; }
.pc-eye {
    font-family:'Jost',sans-serif; font-size:8.5px;
    letter-spacing:0.45em; text-transform:uppercase;
    color:var(--cream-60); font-weight:300; margin-bottom:12px;
    transition: color 0.3s ease;
}
.pc:hover .pc-eye { color:rgba(226,214,204,0.85); }
.pc-title {
    font-family:'Cammron','Georgia',serif;
    font-size:clamp(17px,2.2vw,22px); font-weight:400;
    color:var(--cream); line-height:1.25; margin-bottom:18px;
}
.pc-arrow {
    font-size:16px; color:var(--cream-60);
    transition: transform 0.3s ease, color 0.3s ease; display:block;
}
.pc:hover .pc-arrow { transform:translateX(4px); color:var(--cream); }

/* ── PROGRESS ── */
.prog-bar {
    width:100%; height:1px;
    background:rgba(226,214,204,0.1);
    margin-bottom:36px;
}
.prog-fill { height:100%; background:var(--oxblood); transition:width 0.5s ease; }

/* ── QUESTION ── */
.q-counter {
    font-family:'Jost',sans-serif; font-size:9px;
    letter-spacing:0.4em; text-transform:uppercase;
    color:var(--cream-60); margin-bottom:18px; font-weight:300;
}
.q-text {
    font-family:'Cammron','Georgia',serif;
    font-size:clamp(22px,3.2vw,34px); font-weight:300;
    line-height:1.3; color:var(--cream); margin-bottom:10px;
}
.q-sub {
    font-family:'Jost',sans-serif; font-size:12.5px;
    font-weight:300; color:var(--cream-60);
    margin-bottom:32px; line-height:1.65;
}

/* ── OPTIONS ── */
.opts {
    display:grid; gap:10px; margin-bottom:36px;
}
.opts.c2 { grid-template-columns:1fr 1fr; }
.opts.c3 { grid-template-columns:1fr 1fr 1fr; }
.opts.branch { grid-template-columns:1fr 1fr 1fr; }

.opt {
    border:1px solid rgba(226,214,204,0.16);
    padding:17px 20px; cursor:pointer;
    transition:all 0.22s ease;
    font-family:'Cammron','Georgia',serif;
    font-size:15.5px; font-weight:400; color:var(--cream);
}
.opt:hover {
    border-color:rgba(226,214,204,0.38);
    background:rgba(226,214,204,0.04);
}
.opt.sel {
    border-color:var(--oxblood);
    background:var(--oxblood-40);
}
.opt.sel::after {
    content:''; /* checkmark handled by border color */
}

/* ── NAV ── */
.nav-row {
    display:flex; align-items:center; justify-content:space-between;
}
.btn-back {
    font-family:'Jost',sans-serif; font-size:10px;
    letter-spacing:0.3em; text-transform:uppercase;
    color:var(--cream-60); background:none; border:none;
    cursor:pointer; padding:0; transition:color 0.2s ease; font-weight:300;
}
.btn-back:hover { color:var(--cream); }
.btn-next {
    font-family:'Jost',sans-serif; font-size:10px;
    letter-spacing:0.38em; text-transform:uppercase;
    color:var(--black); background:var(--cream);
    border:none; cursor:pointer; padding:15px 32px;
    transition:all 0.3s ease; font-weight:400;
    opacity:0.35; pointer-events:none;
}
.btn-next.on { opacity:1; pointer-events:all; }
.btn-next.on:hover { background:var(--oxblood); color:var(--cream); }

/* ── FORM ── */
.form-headline {
    font-family:'Cammron','Georgia',serif;
    font-size:clamp(22px,3vw,32px); font-weight:300;
    font-style:italic; color:var(--cream);
    line-height:1.3; margin-bottom:8px;
}
.form-sub {
    font-family:'Jost',sans-serif; font-size:12.5px;
    font-weight:300; color:var(--cream-60);
    margin-bottom:36px; line-height:1.7;
}
.fgroup { margin-bottom:24px; }
.flabel {
    font-family:'Jost',sans-serif; font-size:8.5px;
    letter-spacing:0.42em; text-transform:uppercase;
    color:var(--cream-60); font-weight:300;
    display:block; margin-bottom:10px;
}
.finput {
    width:100%; background:transparent; border:none;
    border-bottom:1px solid rgba(226,214,204,0.22);
    color:var(--cream); font-family:'Cammron','Georgia',serif;
    font-size:18px; font-weight:300; padding:10px 0;
    outline:none; transition:border-color 0.3s ease;
}
.finput:focus { border-bottom-color:var(--cream); }
.finput::placeholder { color:rgba(226,214,204,0.18); font-style:italic; }
.finput.err { border-bottom-color:var(--oxblood) !important; }
textarea.finput { resize:none; height:64px; line-height:1.5; }
.form-privacy {
    font-family:'Jost',sans-serif; font-size:9.5px;
    font-weight:300; color:rgba(226,214,204,0.28);
    margin-bottom:28px; line-height:1.7;
}
.btn-submit {
    font-family:'Jost',sans-serif; font-size:10px;
    letter-spacing:0.45em; text-transform:uppercase;
    color:var(--black); background:var(--cream);
    border:none; cursor:pointer; padding:18px 0;
    width:100%; transition:background 0.3s, color 0.3s;
    font-weight:400; margin-bottom:18px;
}
.btn-submit:hover { background:var(--oxblood); color:var(--cream); }

/* ── END ── */
.end-eye {
    font-family:'Jost',sans-serif; font-size:8.5px;
    letter-spacing:0.55em; text-transform:uppercase;
    color:var(--cream-60); font-weight:300; margin-bottom:20px;
}
.end-h {
    font-family:'Cammron','Georgia',serif;
    font-size:clamp(24px,3.5vw,38px); font-weight:300;
    font-style:italic; color:var(--cream);
    line-height:1.25; margin-bottom:16px;
}
.end-sub {
    font-family:'Jost',sans-serif; font-size:13px;
    font-weight:300; color:var(--cream-60);
    line-height:1.85; margin-bottom:40px; max-width:480px;
}
.end-div { width:32px; height:1px; background:var(--cream-30); margin-bottom:40px; }
.end-pts { list-style:none; width:100%; margin-bottom:44px; }
.end-pts li {
    font-family:'Cammron','Georgia',serif;
    font-size:16.5px; font-weight:400; color:var(--cream);
    padding:16px 0; border-bottom:1px solid var(--cream-12);
    display:flex; align-items:flex-start; gap:16px; line-height:1.4;
}
.end-pts li:first-child { border-top:1px solid var(--cream-12); }
.end-pts li::before {
    content:'—'; color:var(--oxblood); flex-shrink:0;
    font-family:'Jost',sans-serif; font-size:12px; margin-top:3px;
}
.end-contact {
    font-family:'Jost',sans-serif; font-size:10px;
    letter-spacing:0.3em; text-transform:uppercase;
    color:var(--cream-30); font-weight:300; line-height:2.2; text-align:center;
}

@media (max-width:540px) {
    .path-cards, .opts.c2, .opts.c3, .opts.branch { grid-template-columns:1fr; }
}
</style>

}

function question(path, idx) {
    const qs = QS[path];
    const q  = qs[idx];
    const total = qs.length;
    const pct = (idx / total) * 100;
    const sel = S.answers[`${path}__${q.id}`] || null;
    const opts = q.opts.map(o => {
        const isSel = sel === o;
        const safe = o.replace(/'/g,"\\'").replace(/`/g,'\\`');
        return `<div class="opt${isSel?' sel':''}" onclick="pick(this,'${path}','${q.id}',\`${safe}\`)">${o}</div>`;
    }).join('');
    mount(`<div class="wrap bg">
        <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
        ${logoHTML()}
        <div class="q-counter">${String(idx+1).padStart(2,'0')} / ${String(total).padStart(2,'0')}</div>
        <h2 class="q-text">${q.text}</h2>
        ${q.sub ? `<p class="q-sub">${q.sub}</p>` : ''}
        <div class="opts ${q.cols}" id="og">${opts}</div>
        <div class="nav-row">
            <button class="btn-back" onclick="goBack()">← Back</button>
            <button class="btn-next${sel?' on':''}" id="bn" onclick="advance('${path}',${idx})">
                ${idx < total-1 ? 'Continue' : 'Almost there'}
            </button>
        </div>
    </div>`);
}

function contactScreen(path) {
    const copy = {
        investment: { h:'Let\'s begin your investment conversation.', s:'Your information is kept entirely private. Whitney will reach out personally within 24 hours.' },
        sell:       { h:'Tell Whitney a little about yourself.',       s:'Whitney will review your profile and reach out to schedule a private, no-obligation consultation.' },
        buy:        { h:'Let\'s find your next home.',                  s:'Whitney will review your preferences and be in touch to begin your curated property search.' }
    }[path];
    const extra = {
        sell:`<div class="fgroup"><label class="flabel">Property Address <span style="opacity:.4;">(Optional)</span></label><input class="finput" type="text" id="f-addr" placeholder="Your property address"></div>`,
        buy:`<div class="fgroup"><label class="flabel">Anything else Whitney should know?</label><textarea class="finput" id="f-notes" placeholder="Neighborhoods, must-haves, or anything on your mind…"></textarea></div>`,
        investment:`<div class="fgroup"><label class="flabel">Preferred way to connect</label><input class="finput" type="text" id="f-pref" placeholder="Call, email, or text"></div>`
    }[path];
    mount(`<div class="wrap bg">
        ${logoHTML()}
        <h2 class="form-headline">${copy.h}</h2>
        <p class="form-sub">${copy.s}</p>
        <div class="fgroup"><label class="flabel">Full Name</label><input class="finput" type="text" id="f-name" placeholder="Your name"></div>
        <div class="fgroup"><label class="flabel">Phone</label><input class="finput" type="tel" id="f-phone" placeholder="Your phone number"></div>
        <div class="fgroup"><label class="flabel">Email</label><input class="finput" type="email" id="f-email" placeholder="Your email address"></div>
        ${extra}
        <p class="form-privacy">Your information is never shared or sold. Whitney reviews every inquiry personally.</p>
        <button class="btn-submit" onclick="doSubmit('${path}')">Schedule Your Consultation</button>
        <button class="btn-back" onclick="goBack()">← Back</button>
    </div>`);
}

function endScreen(path) {
    const c = END[path];
    const pts = c.pts.map(p=>`<li>${p}</li>`).join('');
    mount(`<div class="wrap bg" style="text-align:center;">
        ${logoHTML()}
        <p class="end-eye">Thank you</p>
        <h2 class="end-h">${c.h}</h2>
        <p class="end-sub">${c.s}</p>
        <div class="end-div"></div>
        <ul class="end-pts" style="text-align:left;">${pts}</ul>
        <div class="end-contact">Whitney Pendergrass &nbsp;·&nbsp; 806-549-0015<br>wpendergrass@kw.com</div>
    </div>`);
}

function goInvest() { hist.push(pathChoice); S.path='investment'; question('investment',0); }
function goBuySell() { hist.push(pathChoice); branch(); }
function pickBranch(sub) { hist.push(branch); S.subpath=sub; question(sub,0); }
function goBack() { if(hist.length) hist.pop()(); }

function pick(el,path,qid,val) {
    el.closest('.opts').querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
    el.classList.add('sel');
    S.answers[`${path}__${qid}`]=val;
    const bn=document.getElementById('bn');
    if(bn) bn.classList.add('on');
}

function advance(path,idx) {
    const qs=QS[path]; const q=qs[idx];
    if(!S.answers[`${path}__${q.id}`]) return;
    hist.push(()=>question(path,idx));
    if(idx<qs.length-1) question(path,idx+1);
    else contactScreen(path);
}

function doSubmit(path) {
    const nameEl=document.getElementById('f-name');
    const phoneEl=document.getElementById('f-phone');
    const emailEl=document.getElementById('f-email');
    let ok=true;
    [nameEl,phoneEl,emailEl].forEach(el=>{ if(!el.value.trim()){el.classList.add('err');ok=false;}else el.classList.remove('err'); });
    if(!ok) return;

    const pathLabel = path==='investment' ? 'Investment Opportunities' : path==='sell' ? 'Sell a Home' : 'Buy a Home';
    const data = {
        _subject: `New Lead: ${nameEl.value.trim()} — ${pathLabel}`,
        name:    nameEl.value.trim(),
        phone:   phoneEl.value.trim(),
        email:   emailEl.value.trim(),
        inquiry: pathLabel
    };

    const extra = document.getElementById('f-addr') || document.getElementById('f-notes') || document.getElementById('f-pref');
    if(extra && extra.value.trim()) {
        data[extra.id==='f-addr' ? 'property_address' : extra.id==='f-notes' ? 'additional_notes' : 'preferred_contact'] = extra.value.trim();
    }

    Object.entries(S.answers).forEach(([key,val]) => {
        if(key.startsWith(path+'__')) {
            const label = key.replace(path+'__','').replace(/-/g,' ');
            data[label] = val;
        }
    });

    const btn = document.querySelector('.btn-submit');
    if(btn) { btn.textContent='Sending…'; btn.style.opacity='0.6'; btn.style.pointerEvents='none'; }

    fetch('https://formspree.io/f/xzdkqpzq', {
        method:'POST',
        headers:{'Content-Type':'application/json','Accept':'application/json'},
        body:JSON.stringify(data)
    })
    .then(r=>r.json())
    .then(res=>{
        if(res.ok||res.next) {
            hist.push(()=>contactScreen(path));
            endScreen(path);
        } else {
            if(btn){ btn.textContent='Schedule Your Consultation'; btn.style.opacity='1'; btn.style.pointerEvents='all'; }
        }
    })
    .catch(()=>{
        if(btn){ btn.textContent='Schedule Your Consultation'; btn.style.opacity='1'; btn.style.pointerEvents='all'; }
    });
}

pathChoice();
</script>
</body>
</html>
